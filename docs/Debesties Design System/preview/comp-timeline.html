<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: #F8F5F0; padding: 24px 20px; }
.timeline { position: relative; display: flex; flex-direction: column; gap: 0; }
.timeline::before { content:''; position:absolute; left:32px; top:0; bottom:0; width:2px; background:linear-gradient(to bottom,#E8A800,#EDE8E0 80%); border-radius:2px; }
.t-item { display: flex; gap: 16px; align-items: flex-start; position: relative; padding-bottom: 20px; }
.t-item:last-child { padding-bottom: 0; }
.t-node { width:28px; height:28px; border-radius:50%; background:white; border:2.5px solid #EDE8E0; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; position:relative; z-index:1; }
.t-node.winner { border-color:#E8A800; background:#FFFAED; }
.t-node.double { border-color:#E8A800; background:#E8A800; box-shadow:0 0 0 4px rgba(232,168,0,0.18); }
.year { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; color:#E8A800; }
.year-muted { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; color:#BDB5A6; }
.t-body { flex:1; }
.t-year-label { font-family:'Space Mono',monospace; font-size:10px; font-weight:700; color:#E8A800; letter-spacing:0.06em; margin-bottom:2px; }
.t-name { font-family:'Playfair Display',serif; font-size:16px; font-weight:700; color:#1A1410; line-height:1.2; }
.t-name-muted { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:#9E9387; line-height:1.2; }
.champion { display:inline-flex; align-items:center; font-family:'Outfit',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; background:#E8A800; color:#1A1410; padding:1px 6px; border-radius:3px; margin-left:7px; vertical-align:middle; }
.annulled { display:inline-flex; align-items:center; font-family:'Outfit',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; background:#FEE2E2; color:#7F1D1D; padding:1px 6px; border-radius:3px; margin-left:7px; vertical-align:middle; }
</style>
</head>
<body>
<div class="timeline">
  <div class="t-item">
    <div class="t-node double"><span style="color:#1A1410;font-size:10px;">★</span></div>
    <div class="t-body">
      <div class="t-year-label">2026</div>
      <div class="t-name">Black Sherif <span class="champion">★★ 2× Champ</span></div>
    </div>
  </div>
  <div class="t-item">
    <div class="t-node winner"><span class="year">25</span></div>
    <div class="t-body">
      <div class="t-year-label">2025</div>
      <div class="t-name">King Promise</div>
    </div>
  </div>
  <div class="t-item">
    <div class="t-node double"><span style="color:#1A1410;font-size:10px;">★</span></div>
    <div class="t-body">
      <div class="t-year-label">2024</div>
      <div class="t-name">Stonebwoy <span class="champion">★★ 2× Champ</span></div>
    </div>
  </div>
  <div class="t-item">
    <div class="t-node winner"><span class="year">23</span></div>
    <div class="t-body">
      <div class="t-year-label">2023</div>
      <div class="t-name">Black Sherif</div>
    </div>
  </div>
  <div class="t-item">
    <div class="t-node" style="border-color:#D9D0C4;"></div>
    <div class="t-body">
      <div class="t-year-label" style="color:#BDB5A6;">2019</div>
      <div class="t-name-muted">— <span class="annulled">Annulled</span></div>
    </div>
  </div>
</div>
</body>
</html>
