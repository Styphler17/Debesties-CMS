<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: #F8F5F0; padding: 20px; }
.row { display: flex; gap: 6px; margin-bottom: 16px; }
.swatch { flex: 1; border-radius: 6px; height: 52px; position: relative; }
.swatch.tall { height: 72px; }
.label { font-size: 10px; color: #7A7163; margin-top: 5px; font-family: 'Space Mono', monospace; text-align: center; }
.group-title { font-size: 11px; font-weight: 600; color: #9E9387; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.badge { position: absolute; top: 4px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: 700; background: rgba(0,0,0,0.22); color: white; border-radius: 3px; padding: 1px 5px; white-space: nowrap; letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="group-title">Forest Green — Accent</div>
<div class="row">
  <div><div class="swatch" style="background:#EDFAF2; border:1px solid #EDE8E0;"></div><div class="label">50</div></div>
  <div><div class="swatch" style="background:#C8EFD8;"></div><div class="label">100</div></div>
  <div><div class="swatch" style="background:#8EDAB0;"></div><div class="label">200</div></div>
  <div><div class="swatch" style="background:#4EC17E;"></div><div class="label">300</div></div>
  <div><div class="swatch" style="background:#22A35A;"></div><div class="label">400</div></div>
  <div><div class="swatch tall" style="background:#1A5C2E;"><span class="badge">ACCENT</span></div><div class="label">500</div></div>
  <div><div class="swatch" style="background:#144A24;"></div><div class="label">600</div></div>
  <div><div class="swatch" style="background:#0E381B;"></div><div class="label">700</div></div>
</div>

<div class="group-title">Ghana Red — Highlight</div>
<div class="row">
  <div><div class="swatch" style="background:#FEF2F2; border:1px solid #EDE8E0;"></div><div class="label">50</div></div>
  <div><div class="swatch" style="background:#FEE2E2;"></div><div class="label">100</div></div>
  <div><div class="swatch" style="background:#FCA5A5;"></div><div class="label">300</div></div>
  <div><div class="swatch tall" style="background:#B91C1C;"><span class="badge">RED</span></div><div class="label">500</div></div>
  <div><div class="swatch" style="background:#7F1D1D;"></div><div class="label">700</div></div>
  <div><div class="swatch" style="background:#450A0A;"></div><div class="label">900</div></div>
</div>
</body>
</html>
