<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: #F8F5F0; padding: 20px; }
.row { display: flex; align-items: center; gap: 12px; padding: 5px 0; border-bottom: 1px solid #EDE8E0; }
.row:last-child { border-bottom: none; }
.bar-wrap { width: 200px; }
.bar { background: #E8A800; border-radius: 3px; height: 12px; opacity: 0.85; }
.token { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; color: #E8A800; min-width: 60px; }
.px { font-size: 11px; color: #7A7163; min-width: 36px; }
.label { font-size: 11px; color: #9E9387; }
.title { font-size: 11px; font-weight: 700; color: #9E9387; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="title">Spacing Scale</div>
<div class="row"><span class="token">--space-1</span><span class="px">4px</span><div class="bar-wrap"><div class="bar" style="width:4px;"></div></div><span class="label">micro gap</span></div>
<div class="row"><span class="token">--space-2</span><span class="px">8px</span><div class="bar-wrap"><div class="bar" style="width:8px;"></div></div><span class="label">tight gap</span></div>
<div class="row"><span class="token">--space-3</span><span class="px">12px</span><div class="bar-wrap"><div class="bar" style="width:12px;"></div></div><span class="label">icon + label</span></div>
<div class="row"><span class="token">--space-4</span><span class="px">16px</span><div class="bar-wrap"><div class="bar" style="width:16px;"></div></div><span class="label">default gap</span></div>
<div class="row"><span class="token">--space-6</span><span class="px">24px</span><div class="bar-wrap"><div class="bar" style="width:24px;"></div></div><span class="label">card padding</span></div>
<div class="row"><span class="token">--space-8</span><span class="px">32px</span><div class="bar-wrap"><div class="bar" style="width:32px;"></div></div><span class="label">section gap</span></div>
<div class="row"><span class="token">--space-12</span><span class="px">48px</span><div class="bar-wrap"><div class="bar" style="width:48px;"></div></div><span class="label">section pad</span></div>
<div class="row"><span class="token">--space-16</span><span class="px">64px</span><div class="bar-wrap"><div class="bar" style="width:64px;"></div></div><span class="label">page section</span></div>
<div class="row"><span class="token">--space-24</span><span class="px">96px</span><div class="bar-wrap"><div class="bar" style="width:96px;"></div></div><span class="label">hero pad</span></div>
</body>
</html>
