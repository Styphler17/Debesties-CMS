<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Playfair Display', serif; background: #F8F5F0; padding: 24px; }
.kicker { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #E8A800; margin-bottom: 10px; font-family: 'Outfit', sans-serif; }
.hero { font-size: 52px; font-weight: 900; line-height: 1.08; color: #1A1410; letter-spacing: -0.03em; margin-bottom: 16px; }
.subhead { font-size: 24px; font-weight: 700; line-height: 1.3; color: #2A2218; margin-bottom: 16px; }
.italic { font-style: italic; font-weight: 400; font-size: 20px; line-height: 1.4; color: #5C5448; margin-bottom: 16px; }
.meta { font-size: 11px; color: #9E9387; letter-spacing: 0.05em; font-family: 'Outfit', sans-serif; border-top: 1px solid #EDE8E0; padding-top: 12px; display: flex; gap: 20px; }
.meta span { display: flex; flex-direction: column; gap: 2px; }
.meta b { color: #1A1410; font-weight: 600; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="kicker">Artiste of the Year</div>
<div class="hero">The Elite Club</div>
<div class="subhead">Four Artists Who Conquered the TGMAs — Twice</div>
<div class="italic">"From the Hiplife era to today's global Afrobeats wave,<br>the award reflects every seismic shift in Ghanaian music."</div>
<div class="meta">
  <span><b>Playfair Display</b>serif · display</span>
  <span><b>900 / 700 / 400</b>weights used</span>
  <span><b>Italic</b>for pull quotes</span>
</div>
</body>
</html>
