<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: #F8F5F0; padding: 20px; display: flex; gap: 14px; flex-wrap: wrap; }
.card { background: white; border-radius: 12px; border: 1px solid #EDE8E0; box-shadow: 0 2px 8px rgba(26,20,16,0.08); overflow: hidden; width: 200px; }
.card-img { width: 100%; height: 100px; object-fit: cover; display: block; }
.card-img-placeholder { width: 100%; height: 100px; background: linear-gradient(135deg, #1A1410 0%, #3D3529 100%); display: flex; align-items: center; justify-content: center; }
.card-body { padding: 14px; }
.kicker { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #E8A800; margin-bottom: 4px; }
.title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: #1A1410; line-height: 1.3; margin-bottom: 6px; }
.meta { font-size: 11px; color: #7A7163; display: flex; gap: 8px; }
.champ-card { background: #1A1410; border-color: #E8A800; }
.champ-card .title { color: #F8F5F0; }
.champ-card .meta { color: #7A7163; }
.stat { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; color: #E8A800; line-height: 1; }
.stat-label { font-size: 11px; color: #BDB5A6; margin-top: 3px; }
.badge-row { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
.badge { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; background: #E8A800; color: #1A1410; }
.badge-yr { background: #EDE8E0; color: #5C5448; }
</style>
</head>
<body>

<!-- Standard article card -->
<div class="card">
  <div class="card-img-placeholder">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#E8A800" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
  </div>
  <div class="card-body">
    <div class="kicker">Timeline · 2026</div>
    <div class="title">The Elite Club: 4 Artists, 2 Wins Each</div>
    <div class="meta"><span>May 27, 2026</span><span>·</span><span>4 min</span></div>
  </div>
</div>

<!-- Champion artist card -->
<div class="card champ-card">
  <div class="card-body" style="padding:16px;">
    <div class="badge-row">
      <span class="badge">★★ 2× Champ</span>
      <span class="badge badge-yr">2023 · 2026</span>
    </div>
    <div class="title">Black Sherif</div>
    <div class="stat">2</div>
    <div class="stat-label">Artiste of the Year wins</div>
  </div>
</div>

<!-- Compact card -->
<div class="card" style="width:160px;">
  <div class="card-body">
    <div class="kicker">Analysis</div>
    <div class="title" style="font-size:13px;">V.I.P: The Originators</div>
    <div class="meta"><span>1999 · 2011</span></div>
  </div>
</div>

</body>
</html>
