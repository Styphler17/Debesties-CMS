<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Outfit:wght@400;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: #F8F5F0; padding: 20px; }
.infographic { background: #1A1410; border-radius: 14px; padding: 22px; color: #F8F5F0; }
.ig-kicker { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #E8A800; margin-bottom: 6px; }
.ig-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: white; line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 4px; }
.ig-sub { font-size: 12px; color: #7A7163; margin-bottom: 16px; }
.ig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ig-artist { background: rgba(255,255,255,0.05); border: 1px solid rgba(232,168,0,0.2); border-radius: 8px; padding: 10px 12px; }
.ig-artist-name { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; color: white; margin-bottom: 4px; }
.ig-years { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: #E8A800; }
.ig-footer { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: #5C5448; line-height: 1.6; }
.ig-footer strong { color: #9E9387; }
</style>
</head>
<body>
<div class="infographic">
  <div class="ig-kicker">The Elite Club · TGMA History</div>
  <div class="ig-title">4 Artists.<br>2 Wins Each.</div>
  <div class="ig-sub">The only acts to win Artiste of the Year more than once</div>
  <div class="ig-grid">
    <div class="ig-artist">
      <div class="ig-artist-name">V.I.P</div>
      <div class="ig-years">2004 · 2011</div>
    </div>
    <div class="ig-artist">
      <div class="ig-artist-name">Sarkodie</div>
      <div class="ig-years">2010 · 2012</div>
    </div>
    <div class="ig-artist">
      <div class="ig-artist-name">Stonebwoy</div>
      <div class="ig-years">2015 · 2024</div>
    </div>
    <div class="ig-artist">
      <div class="ig-artist-name">Black Sherif</div>
      <div class="ig-years">2023 · 2026</div>
    </div>
  </div>
  <div class="ig-footer"><strong>Did you know?</strong> V.I.P won in the golden Hiplife era — Black Sherif in the global Afrobeats wave.</div>
</div>
</body>
</html>
