<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: #F8F5F0; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
.logo-row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
/* Wordmark — light bg */
.wordmark { display: inline-flex; align-items: baseline; gap: 0; }
.wordmark-de { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 32px; color: #1A1410; letter-spacing: -0.03em; }
.wordmark-besties { font-family: 'Playfair Display', serif; font-weight: 700; font-style: italic; font-size: 32px; color: #E8A800; letter-spacing: -0.02em; }
/* Wordmark — dark bg */
.wordmark-dark { background: #1A1410; padding: 14px 20px; border-radius: 10px; display: inline-flex; align-items: baseline; }
.wordmark-dark .wordmark-de { color: #F8F5F0; }
/* Icon lockup */
.lockup { display: inline-flex; align-items: center; gap: 10px; }
.icon-mark { width: 40px; height: 40px; background: #E8A800; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
/* Favicon-scale */
.favicon { width: 24px; height: 24px; background: #E8A800; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
.favicon span { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 900; color: #1A1410; line-height: 1; }
.label { font-size: 10px; color: #9E9387; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }
.divider { border: none; border-top: 1px solid #EDE8E0; }
</style>
</head>
<body>

<div>
  <div class="label">Wordmark — Light</div>
  <div class="wordmark">
    <span class="wordmark-de">De</span><span class="wordmark-besties">besties</span>
  </div>
</div>

<div>
  <div class="label">Wordmark — Dark</div>
  <div class="wordmark-dark">
    <div class="wordmark">
      <span class="wordmark-de">De</span><span class="wordmark-besties">besties</span>
    </div>
  </div>
</div>

<hr class="divider">

<div>
  <div class="label">Icon Lockup</div>
  <div class="lockup">
    <div class="icon-mark">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1A1410" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </div>
    <div class="wordmark" style="gap:0;">
      <span class="wordmark-de" style="font-size:22px;">De</span><span class="wordmark-besties" style="font-size:22px;">besties</span>
    </div>
  </div>
</div>

<div>
  <div class="label">Favicon / App Icon (24px)</div>
  <div class="favicon"><span>D</span></div>
</div>

</body>
</html>
