<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: #F8F5F0; padding: 20px; }
.row { display: flex; gap: 6px; }
.swatch { flex: 1; border-radius: 6px; height: 52px; position: relative; }
.swatch.tall { height: 72px; }
.label { font-size: 10px; color: #7A7163; margin-top: 5px; font-family: 'Space Mono', monospace; text-align: center; }
.group { margin-bottom: 16px; }
.group-title { font-size: 11px; font-weight: 600; color: #9E9387; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.primary-badge { position: absolute; top: 4px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: 700; background: rgba(0,0,0,0.25); color: white; border-radius: 3px; padding: 1px 5px; white-space: nowrap; letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="group">
  <div class="group-title">Gold — Primary</div>
  <div class="row">
    <div><div class="swatch" style="background:#FFFAED; border:1px solid #EDE8E0;"></div><div class="label">50</div></div>
    <div><div class="swatch" style="background:#FFF0C2;"></div><div class="label">100</div></div>
    <div><div class="swatch" style="background:#FFE085;"></div><div class="label">200</div></div>
    <div><div class="swatch" style="background:#FFCA3A;"></div><div class="label">300</div></div>
    <div><div class="swatch" style="background:#F5B000;"></div><div class="label">400</div></div>
    <div><div class="swatch tall" style="background:#E8A800; position:relative;"><span class="primary-badge">PRIMARY</span></div><div class="label">500</div></div>
    <div><div class="swatch" style="background:#C88C00;"></div><div class="label">600</div></div>
    <div><div class="swatch" style="background:#A06C00;"></div><div class="label">700</div></div>
    <div><div class="swatch" style="background:#7A4F00;"></div><div class="label">800</div></div>
    <div><div class="swatch" style="background:#4D3000;"></div><div class="label">900</div></div>
  </div>
</div>
</body>
</html>
